databases:
  - name: jobboard-ats-db
    plan: free
    databaseName: jobboard_ats
    user: jobboard_ats

services:
  - type: web
    name: jobboard-ats
    runtime: python
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput
    startCommand: >
      python create_superuser.py &&
      gunicorn jobboard_ats.wsgi:application --workers 2 --threads 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: jobboard-ats-db
          property: connectionString
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
